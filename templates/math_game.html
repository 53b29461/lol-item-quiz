<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学ゲーム - LoL Item Quiz</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='animations.css') }}">
</head>

<body>
    <a href="/" class="back-link">← TOP</a>
    
    <div class="container">
        <header class="math-game-header">
            <h1>数学ゲーム</h1>
            <p class="text-secondary">桁当てチャレンジ</p>
            <div class="game-status-bar">
                <div class="status-item">
                    <span class="status-label">問題</span>
                    <span id="currentQuestion" class="status-value">1</span>/10
                </div>
                <div class="status-item">
                    <span class="status-label">時間</span>
                    <span id="timer" class="status-value">00:00</span>
                </div>
            </div>
        </header>

        <main class="math-game-area">
            <!-- 開始画面 -->
            <div id="startScreen" class="math-screen active">
                <div class="math-welcome-card">
                    <h2>桁当てゲーム</h2>
                    <p class="game-description">計算結果の十の位または一の位を当てるゲームです</p>
                    <p class="game-challenge">10問連続で挑戦しましょう！</p>
                    <button id="startButton" class="btn btn-primary btn-large">ゲームスタート</button>
                </div>
            </div>

            <!-- 難易度選択画面 -->
            <div id="difficultyScreen" class="math-screen" style="display: none;">
                <h2>難易度を選択</h2>
                <div class="difficulty-grid">
                    <div class="difficulty-card normal">
                        <h3>ノーマル</h3>
                        <div class="difficulty-features">
                            <p>• 2桁 + 2桁</p>
                            <p>• 3桁 - 2桁</p>
                            <p>• 2桁 × 1桁</p>
                        </div>
                        <p class="difficulty-description">適度な難易度で楽しめます</p>
                        <button id="normalButton" class="btn btn-primary">ノーマル</button>
                    </div>
                    <div class="difficulty-card hard">
                        <h3>ハード</h3>
                        <div class="difficulty-features">
                            <p>• 3桁 + 1-4桁</p>
                            <p>• 3-4桁 - n桁</p>
                            <p>• 2桁 × 2桁</p>
                            <p>• 3-4桁 ÷ n桁</p>
                        </div>
                        <p class="difficulty-description">本格的な暗算力が試されます</p>
                        <button id="hardButton" class="btn btn-secondary">ハード</button>
                    </div>
                </div>
                <button id="backButton" class="btn btn-secondary">戻る</button>
            </div>

            <!-- ゲーム画面 -->
            <div id="gameScreen" class="math-screen" style="display: none;">
                <div class="math-problem-card">
                    <div id="expression" class="math-expression"></div>
                    <div id="answerDisplay" class="math-answer-display"></div>
                    <div id="instruction" class="math-instruction"></div>
                </div>

                <div id="feedback" class="math-feedback"></div>

                <!-- Wordleスタイル数字キーボード -->
                <div class="math-keyboard">
                    <div class="keyboard-row">
                        <button class="math-key tile" data-digit="1">1</button>
                        <button class="math-key tile" data-digit="2">2</button>
                        <button class="math-key tile" data-digit="3">3</button>
                        <button class="math-key tile" data-digit="4">4</button>
                        <button class="math-key tile" data-digit="5">5</button>
                    </div>
                    <div class="keyboard-row">
                        <button class="math-key tile" data-digit="6">6</button>
                        <button class="math-key tile" data-digit="7">7</button>
                        <button class="math-key tile" data-digit="8">8</button>
                        <button class="math-key tile" data-digit="9">9</button>
                        <button class="math-key tile" data-digit="0">0</button>
                    </div>
                </div>
            </div>

            <!-- 結果画面 -->
            <div id="resultScreen" class="math-screen" style="display: none;">
                <div class="math-result-card">
                    <h2>ゲーム終了</h2>
                    <div class="math-results-grid">
                        <div class="math-result-item">
                            <div class="result-number" id="correctCount"></div>
                            <div class="result-label">正解数</div>
                        </div>
                        <div class="math-result-item">
                            <div class="result-number" id="accuracy"></div>
                            <div class="result-label">正答率</div>
                        </div>
                        <div class="math-result-item">
                            <div class="result-number" id="totalTime"></div>
                            <div class="result-label">総時間</div>
                        </div>
                        <div class="math-result-item">
                            <div class="result-number" id="avgTime"></div>
                            <div class="result-label">平均時間</div>
                        </div>
                    </div>
                    <div class="math-result-actions">
                        <button id="playAgainButton" class="btn btn-primary btn-large">もう一度プレイ</button>
                        <a href="/etc" class="btn btn-secondary">戻る</a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='math-game-webapp/js/timer.js') }}"></script>
    <script src="{{ url_for('static', filename='math-game-webapp/js/gameEngine.js') }}"></script>
    <script src="{{ url_for('static', filename='math-game-webapp/js/inputHandler.js') }}"></script>
    <script src="{{ url_for('static', filename='math-game-webapp/js/uiController.js') }}"></script>
    <script src="{{ url_for('static', filename='math-game-webapp/js/main.js') }}"></script>
</body>

</html>
