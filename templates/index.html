<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL Item Quiz - Patch {{ patch_version }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='animations.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='header-nav.css') }}">
</head>
<body>
    <!-- 統一ヘッダー -->
    <header class="site-header">
        <div class="header-content">
            <a href="/" class="site-logo">
                <div>
                    <h1 class="site-title">LoL Item Quiz</h1>
                    <p class="site-subtitle">Patch {{ patch_version }}</p>
                </div>
            </a>
            
            <nav class="site-nav">
                <div class="page-indicator">
                    <span class="indicator-icon">🏠</span>
                    <span>メインメニュー</span>
                </div>
            </nav>
        </div>
    </header>

    <div class="index-container">
        
        <!-- メインクイズカード -->
        <div class="quiz-card-grid">
            <div class="quiz-card">
                <h3>クイズA</h3>
                <p>基本アイテム習得クイズ</p>
                <a href="/quiz_a" class="btn btn-primary">開始</a>
            </div>
            
            <div class="quiz-card">
                <h3>クイズB</h3>
                <p>上級アイテム習得クイズ</p>
                <a href="/quiz_b" class="btn btn-primary">開始</a>
            </div>
            
            <div class="quiz-card">
                <h3>その他のクイズ</h3>
                <p>追加問題とチャレンジ</p>
                <a href="/etc" class="btn btn-primary">開始</a>
            </div>
        </div>
        
        <!-- 学習ツールセクション -->
        <div class="section-divider"></div>
        
        <h2>学習ツール</h2>
        <div class="tool-card-grid">
            <div class="tool-card">
                <h4>アルゴリズム解説</h4>
                <p>クイズAの出題仕組みを理解</p>
                <a href="/quiz_a_algorithm" class="btn btn-secondary">詳細を見る</a>
            </div>
            
            <div class="tool-card featured">
                <h4>関係性グラフ</h4>
                <p>全アイテムの相関関係を視覚化</p>
                <a href="/quiz_a_full_graph" class="btn btn-primary">グラフを見る</a>
            </div>
        </div>
    </div>
    
    <footer>
        <p>&copy; 2024 LoL Item Quiz. All rights reserved.</p>
    </footer>
</body>
</html>
