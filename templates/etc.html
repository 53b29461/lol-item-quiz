<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>その他のクイズ - LoL Item Quiz</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='animations.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='header-nav.css') }}">
</head>
<body>
    <!-- 統一ヘッダー -->
    <header class="site-header etc-header">
        <div class="header-content">
            <a href="/" class="site-logo">
                <div>
                    <h1 class="site-title">LoL Item Quiz</h1>
                    <p class="site-subtitle">その他のクイズ</p>
                </div>
            </a>
            
            <nav class="site-nav">
                <a href="/" class="nav-link">
                    <span>🏠</span>
                    <span>TOP</span>
                </a>
                <div class="page-indicator">
                    <span class="indicator-icon">🎮</span>
                    <span>その他</span>
                </div>
            </nav>
        </div>
    </header>
    
    <div class="index-container">
        
        <!-- ゲームカードセクション -->
        <div class="quiz-card-grid">
            <div class="quiz-card">
                <h3>🔢 数学ゲーム</h3>
                <p>計算結果の桁を当てる暗算チャレンジ</p>
                <p class="game-features">
                    • 10問連続チャレンジ<br>
                    • ノーマル・ハード難易度<br>
                    • タイマー付きスコア計測
                </p>
                <a href="/math-game" class="btn btn-primary">チャレンジ開始</a>
            </div>
            
            <div class="quiz-card placeholder">
                <h3>🎯 更なるチャレンジ</h3>
                <p>今後追加予定のクイズやミニゲーム</p>
                <p class="game-features">
                    • アイテムビルドクイズ<br>
                    • タイムアタックモード<br>
                    • 上級者向けチャレンジ
                </p>
                <button class="btn btn-secondary" disabled>準備中</button>
            </div>
        </div>
        
        <!-- 統計・情報セクション -->
        <div class="section-divider"></div>
        
        <h2>ゲーム情報</h2>
        <div class="tool-card-grid">
            <div class="tool-card">
                <h4>📊 プレイ統計</h4>
                <p>あなたのゲーム成績とランキング</p>
                <button class="btn btn-secondary" disabled>準備中</button>
            </div>
            
            <div class="tool-card">
                <h4>🏆 実績システム</h4>
                <p>獲得できる称号とバッジ</p>
                <button class="btn btn-secondary" disabled>準備中</button>
            </div>
        </div>
    </div>
    
    <footer>
        <p>&copy; 2024 LoL Item Quiz. All rights reserved.</p>
    </footer>
</body>
</html>
